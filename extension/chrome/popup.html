<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 240px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 13px;
      color: #1a1a1a;
      margin: 0;
    }
    h1 {
      font-size: 15px;
      margin: 0 0 12px 0;
      font-weight: 600;
    }
    .status-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .dot.connected { background: #22c55e; }
    .dot.connecting { background: #f59e0b; }
    .dot.disconnected { background: #ef4444; }
    .status-text {
      color: #555;
    }
    .detail {
      margin-top: 8px;
      font-size: 11px;
      color: #888;
    }
  </style>
</head>
<body>
  <h1>exfetch</h1>
  <div class="status-row">
    <span id="dot" class="dot disconnected"></span>
    <span id="status-text" class="status-text">Checking...</span>
  </div>
  <div id="detail" class="detail"></div>
  <script src="popup.js"></script>
</body>
</html>
